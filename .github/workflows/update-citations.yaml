name: update-citations
run-name: update citations

on:
  workflow_call:
    inputs:
      open-pr:
        type: boolean
        required: false
        default: false
    outputs:
      changed:
        value: ${{ jobs.update-citations.outputs.changed }}

  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-citations:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.status.outputs.changed }}

    steps:
      - name: Skip automatic citation update
        id: status
        run: |
          echo "Automatic citation updates are disabled."
          echo "Citations are managed manually."
          echo "changed=false" >> "$GITHUB_OUTPUT"
